<html lang="he" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Referee | PingPong 2026</title>
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#ef4444', dark: '#0f172a', card: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Heebo', 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(10px); }
        .touch-target { min-height: 80px; }
        
        /* Splash Screen Gates */
        #loader-wrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column; /* Vertical split */
            overflow: hidden;
        }
        .gate {
            width: 100%;
            height: 50%;
            background: #0f172a;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1.5s cubic-bezier(0.8, 0, 0.2, 1);
            position: relative;
        }
        .gate-left { 
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .gate-right { 
            border-top: 2px solid rgba(255,255,255,0.1);
        }
        #loader-content {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .loader-logo {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.6));
            animation: bounce-in 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), pulse-red 2s infinite ease-in-out;
            animation-delay: 0s, 1.2s;
        }
        @keyframes pulse-red {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 40px rgba(239, 68, 68, 0.9)); transform: scale(1.02); }
        }
        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .loader-text {
            margin-top: 1rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: white;
            opacity: 0.8;
        }
        .gates-open .gate-left { transform: translateY(-100%); }
        .gates-open .gate-right { transform: translateY(100%); }
        .gates-open #loader-content { opacity: 0; pointer-events: none; }
        .gates-open #loader-wrapper { pointer-events: none; }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="data.js"></script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body class="min-h-screen flex flex-col bg-dark">
    <!-- Splash Screen Loader -->
    <div id="loader-wrapper">
        <div class="gate gate-left"></div>
        <div id="loader-content">
            <img src="logo.png" class="loader-logo" alt="Tournament Logo">
        </div>
        <div class="gate gate-right"></div>
    </div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/10 px-4 py-3 flex justify-between items-center relative z-20">
        <button onclick="window.location.href='index.html'" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white" aria-label="Back">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="flex items-center gap-2 text-primary font-bold">
            <i class="fa-solid fa-gavel"></i> מצב שופט
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('news-overlay').classList.remove('translate-y-full')" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white" title="הוספת חדשות">
                <i class="fa-solid fa-newspaper"></i>
            </button>
            <button onclick="document.getElementById('manual-overlay').classList.remove('translate-y-full')" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white text-xs font-bold" title="הזנת תוצאה ידנית">
                1:1
            </button>
            <button onclick="document.getElementById('schedule-overlay').classList.remove('translate-y-full')" class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white" aria-label="Schedule">
                <i class="fa-solid fa-calendar"></i>
            </button>
        </div>
    </header>

    <!-- Schedule Overlay -->
    <div id="schedule-overlay" class="fixed inset-0 z-[60] bg-slate-900/95 flex flex-col p-6 backdrop-blur-md transition-transform duration-300 translate-y-full overflow-y-auto">
        <h2 class="text-xl font-bold mb-6">קביעת משחק חדש</h2>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">שחקן 1</label>
                <select id="sched-p1" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div>
                <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">שחקן 2</label>
                <select id="sched-p2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">תאריך</label>
                    <input type="date" id="sched-date" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">שעה</label>
                    <input type="time" id="sched-time" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <div class="flex gap-3">
                <button onclick="window.closeSchedule()" class="flex-1 bg-white/5 py-4 rounded-xl font-bold">ביטול</button>
                <button onclick="window.saveSchedule()" class="flex-1 bg-white/10 py-4 rounded-xl font-bold">שמור לתור</button>
            </div>
            <button onclick="window.saveAndStartMatch()" class="w-full bg-green-500 py-4 rounded-xl font-bold shadow-lg shadow-green-500/20">שמור והתחל משחק עכשיו!</button>
        </div>
    </div>

    <!-- Manual Entry Overlay -->
    <div id="manual-overlay" class="fixed inset-0 z-[60] bg-slate-900/95 flex flex-col p-6 backdrop-blur-md transition-transform duration-300 translate-y-full overflow-y-auto">
        <h2 class="text-xl font-bold mb-6">הזנת תוצאה ידנית</h2>
        
        <div class="space-y-4 mb-8">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">שחקן 1</label>
                    <select id="man-p1" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">שחקן 2</label>
                    <select id="man-p2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">מערכות שחקן 1</label>
                    <input type="number" id="man-sets1" value="2" min="0" max="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">מערכות שחקן 2</label>
                    <input type="number" id="man-sets2" value="0" min="0" max="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="document.getElementById('manual-overlay').classList.add('translate-y-full')" class="flex-1 bg-white/5 py-4 rounded-xl font-bold">ביטול</button>
            <button onclick="window.saveManualResult()" class="flex-1 bg-blue-500 py-4 rounded-xl font-bold shadow-lg shadow-blue-500/20">שמור תוצאה</button>
        </div>
    </div>

    <!-- News Entry Overlay -->
    <div id="news-overlay" class="fixed inset-0 z-[60] bg-slate-900/95 flex flex-col p-6 backdrop-blur-md transition-transform duration-300 translate-y-full overflow-y-auto">
        <h2 class="text-xl font-bold mb-6">פרסום חדשות</h2>
        
        <div class="space-y-4 mb-8">
            <div>
                <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">כותרת</label>
                <input type="text" id="news-title" placeholder="למשל: עדכון על הטורניר..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary">
            </div>
            <div>
                <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">תוכן הידיעה</label>
                <textarea id="news-text" rows="4" placeholder="כתוב כאן את העדכון..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-primary"></textarea>
            </div>
            <div>
                <label class="text-xs text-white/50 uppercase mb-2 block font-bold tracking-widest">הוספת תמונה מהטלפון</label>
                <div class="flex items-center gap-3">
                    <label for="news-image-file" class="flex-1 bg-white/5 border border-dashed border-white/20 rounded-xl py-4 flex flex-col items-center justify-center cursor-pointer hover:bg-white/10 transition-colors">
                        <i class="fa-solid fa-camera text-2xl mb-2 text-primary"></i>
                        <span id="file-status" class="text-xs text-white/50">לחץ לבחירת תמונה</span>
                        <input type="file" id="news-image-file" accept="image/*" class="hidden">
                    </label>
                    <div id="image-preview" class="w-16 h-16 rounded-xl bg-white/5 border border-white/10 hidden overflow-hidden">
                        <img src="" id="preview-img" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="document.getElementById('news-overlay').classList.add('translate-y-full')" class="flex-1 bg-white/5 py-4 rounded-xl font-bold">ביטול</button>
            <button onclick="window.saveNews()" class="flex-1 bg-blue-500 py-4 rounded-xl font-bold shadow-lg shadow-blue-500/20">פרסם</button>
        </div>
    </div>

    <!-- PIN Overlay (Mock) -->
    <div id="pin-overlay" class="absolute inset-0 z-50 bg-dark/95 flex flex-col items-center justify-center p-6 backdrop-blur-md transition-opacity duration-300">
        <i class="fa-solid fa-lock text-4xl text-white/50 mb-4"></i>
        <h2 class="text-xl font-bold mb-1">כניסת מנהל</h2>
        <p class="text-white/50 text-sm mb-6">הזן קוד גישה כדי להמשיך</p>
        <input type="password" id="pin-input" placeholder="****" class="w-48 text-center text-3xl tracking-[1em] p-4 bg-white/10 border border-white/20 rounded-xl focus:outline-none focus:border-primary mb-6" maxlength="4">
        <button onclick="window.checkPin()" class="w-48 py-4 bg-primary text-white font-bold rounded-xl active:scale-95 transition-transform text-lg touch-target">כניסה</button>
        <p class="mt-4 text-white/30 text-sm">רמז: 1234</p>
        <button onclick="window.location.href='index.html'" class="mt-8 text-white/50 underline p-4">חזור לתצוגה הציבורית</button>
    </div>

    <!-- Scoring Interface -->
    <main class="flex-1 flex flex-col p-3 pb-24 relative z-10 max-w-md mx-auto w-full">
        <div class="text-center mb-6 mt-4">
            <span id="ref-set-label" class="text-sm font-bold text-primary uppercase tracking-widest">מערכה 1</span>
            <div class="text-xl font-mono text-primary font-bold" id="ref-timer">08:30</div>
            <button onclick="window.resetMatch()" class="text-white/30 hover:text-white transition-colors mt-2">
                <i class="fa-solid fa-rotate-left"></i> איפוס
            </button>
        </div>

        <div class="flex-1 flex flex-col gap-6">
            <!-- Player 1 Scoring -->
            <div class="flex-1 bg-gradient-to-b from-blue-900/40 to-blue-900/10 rounded-2xl border border-blue-500/30 flex flex-col items-center justify-center p-4 relative min-h-[160px]">
                <span class="absolute top-2 right-4 font-bold text-blue-400 text-sm" id="ref-p1-name">שחקן 1</span>
                <div class="text-[10px] text-white/50 mb-0" id="sets-1-label">מערכות: 0</div>
                <div class="text-7xl font-black font-mono" id="score-1">0</div>
                
                <div class="flex gap-3 mt-4 w-full">
                    <button onclick="window.updateScore(1, -1)" class="flex-1 bg-white/5 py-2 rounded-xl text-xl font-bold active:bg-white/10">-</button>
                    <button onclick="window.updateScore(1, 1)" class="flex-[2] bg-blue-500 py-2 rounded-xl text-xl font-bold shadow-lg shadow-blue-500/20 active:bg-blue-600">+</button>
                </div>
            </div>

            <!-- Player 2 Scoring -->
            <div class="flex-1 bg-gradient-to-b from-primary/30 to-primary/5 rounded-2xl border border-primary/30 flex flex-col items-center justify-center p-4 relative min-h-[160px]">
                <span class="absolute top-2 right-4 font-bold text-primary text-sm" id="ref-p2-name">שחקן 2</span>
                <div class="text-[10px] text-white/50 mb-0" id="sets-2-label">מערכות: 0</div>
                <div class="text-7xl font-black font-mono" id="score-2">0</div>
                
                <div class="flex gap-3 mt-4 w-full">
                    <button onclick="window.updateScore(2, -1)" class="flex-1 bg-white/5 py-2 rounded-xl text-xl font-bold active:bg-white/10">-</button>
                    <button onclick="window.updateScore(2, 1)" class="flex-[2] bg-primary py-2 rounded-xl text-xl font-bold shadow-lg shadow-primary/20 active:bg-red-600">+</button>
                </div>
            </div>
        </div>
        
        <button onclick="window.endMatch()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-4 rounded-2xl transition-all mt-6 flex items-center justify-center gap-2">
            <i class="fa-solid fa-flag-checkered"></i> סיום משחק ושמירה
        </button>

        <!-- Upcoming Matches for Referee -->
        <div class="mt-12 mb-8">
            <h3 class="text-sm font-bold text-white/40 uppercase tracking-widest mb-4">משחקים מחכים</h3>
            <div id="ref-upcoming-queue" class="space-y-3">
                <!-- Populated by JS -->
                <div class="text-center text-white/20 py-8 border border-dashed border-white/10 rounded-2xl text-sm">
                    אין משחקים מתוזמנים
                </div>
            </div>
        </div>
    </main>

    <script>
        window.checkPin = function() {
            const pin = document.getElementById('pin-input').value;
            if (pin === '1234') {
                document.getElementById('pin-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('pin-overlay').style.display = 'none';
                }, 300);
            } else {
                alert('קוד שגוי');
                document.getElementById('pin-input').value = '';
            }
        };

        document.getElementById('pin-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                window.checkPin();
            }
        });

        // --- Initial Gate Opening ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('gates-open');
                setTimeout(() => {
                    const loader = document.getElementById('loader-wrapper');
                    if (loader) loader.style.display = 'none';
                }, 1500);
            }, 1000); // Shorter for referee mode
        });

        let score1 = 0;
        let score2 = 0;
        let sets1 = 0;
        let sets2 = 0;
        let currentSet = 1;
        let liveP1 = '---';
        let liveP2 = '---';

        function initListeners() {
            if (!window.db) {
                setTimeout(initListeners, 500);
                return;
            }

            window.db.ref('liveMatch').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    score1 = data.score1 || 0;
                    score2 = data.score2 || 0;
                    sets1 = data.sets1 || 0;
                    sets2 = data.sets2 || 0;
                    currentSet = data.currentSet || 1;
                    liveP1 = data.p1 || '---';
                    liveP2 = data.p2 || '---';
                    
                    document.getElementById('score-1').innerText = score1;
                    document.getElementById('score-2').innerText = score2;
                    document.getElementById('ref-p1-name').innerText = liveP1;
                    document.getElementById('ref-p2-name').innerText = liveP2;
                    document.getElementById('sets-1-label').innerText = `מערכות: ${sets1}`;
                    document.getElementById('sets-2-label').innerText = `מערכות: ${sets2}`;
                    
                    if (sets1 === 2 || sets2 === 2) {
                        document.getElementById('ref-set-label').innerText = "המשחק הסתיים";
                    } else {
                        document.getElementById('ref-set-label').innerText = `מערכה ${currentSet}`;
                    }
                }
            });

            window.db.ref('upcomingMatches').on('value', (snapshot) => {
                const container = document.getElementById('ref-upcoming-queue');
                const data = snapshot.val();
                const upcoming = data ? Object.entries(data).map(([key, val]) => ({ ...val, firebaseKey: key })) : [];
                
                if (container) {
                    if (upcoming.length === 0) {
                        container.innerHTML = '<p class="text-white/30 text-sm text-center py-4 bg-white/5 rounded-xl">אין משחקים בקרוב</p>';
                    } else {
                        container.innerHTML = upcoming.map(m => `
                            <div class="glass-panel p-3 rounded-xl flex justify-between items-center">
                                <div>
                                    <div class="text-xs text-primary mb-1"><i class="fa-regular fa-clock"></i> ${m.time}</div>
                                    <div class="font-bold text-sm">${m.p1} <span class="text-white/30 mx-1">נגד</span> ${m.p2}</div>
                                </div>
                                <button onclick="window.startUpcomingMatch('${m.firebaseKey}')" class="bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-lg active:scale-95 transition-transform touch-target">התחל</button>
                            </div>
                        `).join('');
                    }
                }
                
                const now = new Date();
                const currentHours = now.getHours().toString().padStart(2, '0');
                const currentMinutes = now.getMinutes().toString().padStart(2, '0');
                const currentTimeString = `${currentHours}:${currentMinutes}`;
                
                if (liveP1 === '---' || !liveP1) {
                    const dueMatch = upcoming.find(m => currentTimeString >= m.time);
                    if (dueMatch) {
                        window.startUpcomingMatch(dueMatch.firebaseKey, true);
                    }
                }
            });
        }

        initListeners();

        function syncToFirebase() {
            if (!window.db) return alert("Error: Database not connected!");
            
            window.db.ref('liveMatch').set({
                score1, score2, sets1, sets2, currentSet,
                p1: document.getElementById('ref-p1-name').innerText,
                p2: document.getElementById('ref-p2-name').innerText
            }).catch(err => {
                alert("Firebase Error: " + err.message);
            });
        }

        window.updateScore = function(player, change) {
            if (sets1 === 2 || sets2 === 2) return;

            if (player === 1) score1 = Math.max(0, score1 + change);
            else score2 = Math.max(0, score2 + change);

            syncToFirebase();

            // Check for set win (must reach 11 AND win by 2)
            if (score1 >= 11 && (score1 - score2) >= 2) {
                setTimeout(() => {
                    const isMatchOver = (sets1 + 1) === 2;
                    const msg = isMatchOver ? "מנצח המערכה: שחקן 1! המשחק הסתיים! לשמור תוצאה?" : "מנצח המערכה: שחקן 1! לעבור למערכה הבאה?";
                    if (confirm(msg)) {
                        sets1++;
                        if (isMatchOver) {
                            window.endMatch(true);
                        } else {
                            window.nextSet();
                        }
                        syncToFirebase();
                    } else {
                        score1 -= change;
                        syncToFirebase();
                    }
                }, 100);
            } else if (score2 >= 11 && (score2 - score1) >= 2) {
                setTimeout(() => {
                    const isMatchOver = (sets2 + 1) === 2;
                    const msg = isMatchOver ? "מנצח המערכה: שחקן 2! המשחק הסתיים! לשמור תוצאה?" : "מנצח המערכה: שחקן 2! לעבור למערכה הבאה?";
                    if (confirm(msg)) {
                        sets2++;
                        if (isMatchOver) {
                            window.endMatch(true);
                        } else {
                            window.nextSet();
                        }
                        syncToFirebase();
                    } else {
                        score2 -= change;
                        syncToFirebase();
                    }
                }, 100);
            }
        };

        window.nextSet = function() {
            if (sets1 !== 2 && sets2 !== 2) {
                currentSet++;
                score1 = 0;
                score2 = 0;
            }
        };

        window.closeSchedule = function() {
            document.getElementById('schedule-overlay').classList.add('translate-y-full');
        };

        window.saveSchedule = function() {
            const p1 = document.getElementById('sched-p1').value;
            const p2 = document.getElementById('sched-p2').value;
            const time = document.getElementById('sched-time').value;
            const date = document.getElementById('sched-date').value;

            if (!time || !date) return alert("אנא בחר תאריך ושעה");
            if (p1 === p2) return alert("בחר שחקנים שונים");

            const matchData = {
                p1, p2, time, date,
                status: 'upcoming',
                timestamp: Date.now()
            };
            
            if (!window.db) return alert("Database not connected");

            window.db.ref('upcomingMatches').push(matchData);
            
            alert('המשחק נוסף לתור!');
            window.closeSchedule();
        };

        window.startUpcomingMatch = function(firebaseKey, skipConfirm = false) {
            if(!skipConfirm && !confirm('פעולה זו תאפס את לוח התוצאות הנוכחי. להמשיך?')) return;
            if(!window.db) return;

            window.db.ref(`upcomingMatches/${firebaseKey}`).once('value').then((snapshot) => {
                const match = snapshot.val();
                if (!match) return;

                window.db.ref(`upcomingMatches/${firebaseKey}`).remove();
                
                score1 = 0;
                score2 = 0;
                sets1 = 0;
                sets2 = 0;
                currentSet = 1;
                
                window.db.ref('liveMatch').set({
                    score1, score2, sets1, sets2, currentSet,
                    p1: match.p1,
                    p2: match.p2
                });
            });
        };

        window.endMatch = function(skipConfirm = false) {
            if(skipConfirm || confirm('האם אתה בטוח שברצונך לסיים את המשחק ולשמור את התוצאה?')) {
                const matchData = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    p1: liveP1,
                    p2: liveP2,
                    score1: score1,
                    score2: score2,
                    sets1: sets1,
                    sets2: sets2
                };

                if(!window.db) return;

                window.db.ref('completedMatches').push(matchData);
                
                window.db.ref('liveMatch').set({
                    score1: 0, score2: 0, sets1: 0, sets2: 0, currentSet: 1,
                    p1: '---', p2: '---'
                });

                alert('התוצאה נשמרה בהצלחה!');
            }
        };

        window.resetMatch = function() {
            if(confirm('האם אתה בטוח שברצונך לאפס את המערכה הנוכחית?')) {
                if(!window.db) return;
                window.db.ref('liveMatch').update({
                    score1: 0, score2: 0, sets1: 0, sets2: 0, currentSet: 1
                });
            }
        };


        window.saveManualResult = function() {
            const p1 = document.getElementById('man-p1').value;
            const p2 = document.getElementById('man-p2').value;
            const sets1 = parseInt(document.getElementById('man-sets1').value);
            const sets2 = parseInt(document.getElementById('man-sets2').value);

            if (p1 === p2) return alert("בחר שני שחקנים שונים");

            const matchData = {
                id: Date.now(),
                date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                p1, p2, score1: 0, score2: 0, sets1, sets2
            };

            if(!window.db) return alert("שגיאה: מסד הנתונים לא מחובר!");

            window.db.ref('completedMatches').push(matchData).then(() => {
                alert('התוצאה נשמרה בהצלחה!');
                document.getElementById('manual-overlay').classList.add('translate-y-full');
            });
        };

        let selectedImageBase64 = null;

        document.getElementById('news-image-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-status').innerText = "מעבד תמונה...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Resize image to keep database size small
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('preview-img').src = selectedImageBase64;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('file-status').innerText = "תמונה נבחרה!";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        window.saveNews = function() {
            const title = document.getElementById('news-title').value;
            const text = document.getElementById('news-text').value;

            if (!title || !text) return alert("אנא הזן כותרת ותוכן");

            const newsData = {
                id: Date.now(),
                date: new Date().toLocaleDateString('he-IL') + ' ' + new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}),
                title,
                text,
                image: selectedImageBase64 || null
            };

            if(!window.db) return alert("שגיאה: מסד הנתונים לא מחובר!");

            window.db.ref('news').push(newsData).then(() => {
                alert('החדשות פורסמו בהצלחה!');
                document.getElementById('news-overlay').classList.add('translate-y-full');
                // Clear form
                document.getElementById('news-title').value = '';
                document.getElementById('news-text').value = '';
                document.getElementById('news-image-file').value = '';
                document.getElementById('image-preview').classList.add('hidden');
                document.getElementById('file-status').innerText = "לחץ לבחירת תמונה";
                selectedImageBase64 = null;
            });
        };

        // --- Live Match Management ---
        window.deleteUpcomingMatch = function(matchId) {
            if(!window.db) return;
            if(confirm('האם אתה בטוח שברצונך למחוק את המשחק המתוזמן?')) {
                window.db.ref(`upcomingMatches/${matchId}`).remove();
            }
        };

        window.startMatch = function(matchId, p1, p2) {
            if(!window.db) return;
            
            const liveData = {
                p1, p2,
                score1: 0, score2: 0,
                sets1: 0, sets2: 0,
                currentSet: 1,
                status: 'live',
                startTime: Date.now()
            };

            // 1. Move to Live Match in Firebase
            window.db.ref('liveMatch').set(liveData);
            
            // 2. Remove from Upcoming
            window.db.ref(`upcomingMatches/${matchId}`).remove();
            
            // 3. Update Local UI Scoreboard
            document.getElementById('ref-p1-name').innerText = p1;
            document.getElementById('ref-p2-name').innerText = p2;
            
            if (typeof score1 !== 'undefined') score1 = 0;
            if (typeof score2 !== 'undefined') score2 = 0;
            if (typeof sets1 !== 'undefined') sets1 = 0;
            if (typeof sets2 !== 'undefined') sets2 = 0;
            if (typeof currentSet !== 'undefined') currentSet = 1;
            
            if(typeof window.renderScoreboard === 'function') window.renderScoreboard();
            
            alert(`המשחק בין ${p1} ל-${p2} התחיל!`);
        };

        // Listen for Upcoming Matches
        if(window.db) {
            window.db.ref('upcomingMatches').on('value', (snapshot) => {
                const container = document.getElementById('ref-upcoming-queue');
                const data = snapshot.val();
                
                if (!data) {
                    container.innerHTML = `<div class="text-center text-white/20 py-8 border border-dashed border-white/10 rounded-2xl text-sm">אין משחקים מתוזמנים</div>`;
                    return;
                }

                const upcoming = Object.entries(data).map(([key, val]) => ({ ...val, id: key }));
                container.innerHTML = upcoming.map(m => `
                    <div class="glass-panel p-4 rounded-2xl flex items-center justify-between border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-xs text-white/40">${m.date ? m.date.split('-').reverse().join('/') : 'היום'} | ${m.time}</span>
                            <span class="font-bold text-sm">${m.p1} <span class="text-primary mx-1">VS</span> ${m.p2}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.deleteUpcomingMatch('${m.id}')" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white w-9 h-9 flex items-center justify-center rounded-xl transition-all">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <button onclick="window.startMatch('${m.id}', '${m.p1}', '${m.p2}')" class="bg-green-500/20 hover:bg-green-500 text-green-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                                התחל
                            </button>
                        </div>
                    </div>
                `).join('');
            });
        }

        if (typeof players !== 'undefined') {
            const p1Select = document.getElementById('sched-p1');
            const p2Select = document.getElementById('sched-p2');
            const m1Select = document.getElementById('man-p1');
            const m2Select = document.getElementById('man-p2');
            
            let options = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            
            p1Select.innerHTML = options;
            p2Select.innerHTML = options;
            m1Select.innerHTML = options;
            m2Select.innerHTML = options;
            
            if (players.length > 1) {
                p2Select.selectedIndex = 1;
                m2Select.selectedIndex = 1;
            }
        }
        window.saveAndStartMatch = function() {
            const p1 = document.getElementById('sched-p1').value;
            const p2 = document.getElementById('sched-p2').value;
            
            if (p1 === p2) return alert("בחר שחקנים שונים");

            const liveData = {
                p1, p2,
                score1: 0, score2: 0,
                sets1: 0, sets2: 0,
                currentSet: 1,
                status: 'live',
                startTime: Date.now()
            };

            if(!window.db) return alert("שגיאה: מסד הנתונים לא מחובר!");

            window.db.ref('liveMatch').set(liveData).then(() => {
                // Update Local UI Scoreboard
                document.getElementById('ref-p1-name').innerText = p1;
                document.getElementById('ref-p2-name').innerText = p2;
                
                // Reset local variables (need to ensure these are accessible)
                // Assuming they are global in the script
                if (typeof score1 !== 'undefined') score1 = 0;
                if (typeof score2 !== 'undefined') score2 = 0;
                if (typeof sets1 !== 'undefined') sets1 = 0;
                if (typeof sets2 !== 'undefined') sets2 = 0;
                if (typeof currentSet !== 'undefined') currentSet = 1;
                
                // Trigger local UI update
                if(typeof window.renderScoreboard === 'function') window.renderScoreboard();
                
                window.closeSchedule();
                alert(`המשחק בין ${p1} ל-${p2} התחיל בשידור חי!`);
            });
        };
    </script>
</body>
</html>
